name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Build release zip
        run: python3 .github/scripts/build_release_zip.py

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: /tmp/vaillant_ebus.zip
          generate_release_notes: true
