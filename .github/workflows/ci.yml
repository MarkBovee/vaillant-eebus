name: CI/CD

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    if: github.ref_type == 'branch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q tests/

      - name: Compile
        run: python3 -m compileall -f custom_components/vaillant_ebus/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q tests/

      - name: Compile
        run: python3 -m compileall -f custom_components/vaillant_ebus/

      - name: Build release zip
        run: |
          git archive --format=tar HEAD custom_components/vaillant_ebus | tar xf - -C /tmp
          cd /tmp/custom_components/vaillant_ebus && zip -qr /tmp/vaillant_ebus.zip .
          rm -rf /tmp/custom_components

      - name: Extract changelog entry
        run: |
          python3 -c "
          import re
          with open('CHANGELOG.md') as f:
            content = f.read()
          m = re.search(r'^##\s+.+?\s*\n(.*?)(?=\n##\s|\Z)', content, re.M|re.S)
          notes = m.group(1).strip() if m else 'Release ${{ github.ref_name }}'
          open('/tmp/release_notes.md','w').write(notes)
          "

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" /tmp/vaillant_ebus.zip --clobber
            gh release edit "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes-file /tmp/release_notes.md
          else
            gh release create "${{ github.ref_name }}" /tmp/vaillant_ebus.zip \
              --title "${{ github.ref_name }}" \
              --notes-file /tmp/release_notes.md
          fi
