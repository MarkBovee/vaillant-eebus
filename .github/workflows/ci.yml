name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install ruff pytest
      - name: Ruff
        run: ruff check .
      - name: Compile check
        run: python3 -m compileall custom_components/vaillant_ebus/
